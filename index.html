<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Hub</title>
  <link rel="stylesheet" href="style.css">
    <script src="./index.js" defer></script>
</head>
<body>

  <!-- Cursor glow -->
  <div class="cursor"></div>

  <!-- Background -->
  <div class="bg"></div>

  <div class="container">
    <h1 class="title">
      Đây là website phục vụ download cho tác giả nên đừng mong nó xịn hơn 😄
    </h1>

    <!-- Search -->
    <input 
      type="text" 
      id="search" 
      placeholder="🔍 Tìm file..." 
      onkeyup="searchFile()"
    />

    <div class="file-list">

      <div class="file">
        <div class="left">
          <span class="icon">📦</span>
          <div class="info">
            <span class="name">setup.zip</span>
            <span class="size">20MB</span>
          </div>
        </div>

        <div class="actions">
          <button onclick="copyLink(`https://drive.google.com/file/d/1zpmoYtlRIvPynFRKr7SWL3OSv9p0rdZY/view?usp=drive_link`)" class="ripple">📋</button>
          <a href="./BTMT-PASS.exe" download class="ripple">⬇</a>
        </div>
      </div>

      <!-- <div class="file">
        <div class="left">
          <span class="icon">📄</span>
          <div class="info">
            <span class="name">report.pdf</span>
            <span class="size">2MB</span>
          </div>
        </div>

        <div class="actions">
          <button onclick="copyLink('files/report.pdf')" class="ripple">📋</button>
          <a href="files/report.pdf" download class="ripple">⬇</a>
        </div>
      </div> -->

    </div>

    <div class="footer">
      @NTV - Nguyễn Tuấn Vũ
    </div>
  </div>



</body>
</html>
