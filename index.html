<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download Hub</title>

  <link rel="stylesheet" href="style.css" />
  <script src="index.js" defer></script>
</head>

<body>

  <!-- Background -->
  <div class="bg"></div>

  <!-- Cursor glow -->
  <div class="cursor"></div>

  <!-- HEADER -->
  <header class="header">
    <h1>
      Đây là website phục vụ download cho tác giả nên đừng mong nó xịn hơn 😄
    </h1>
  </header>

  <!-- MAIN -->
  <main class="main">

    <div class="container">

      <!-- Search -->
      <input 
        type="text" 
        id="search" 
        placeholder="🔍 Tìm file..."
      />

      <!-- File list -->
      <div class="file-list">

        <!-- FILE -->
        <div class="file">
          <div class="left">
            <span class="icon">📦</span>
            <div class="info">
              <span class="name">Bảo trì máy By Nguyễn Tuấn Vũ</span>
              <span class="size">35.3MB</span>
            </div>
          </div>

          <div class="actions">
            <button class="ripple" data-link="bit.ly/ntv-baotri">📋</button>
            <a href="files/setup.zip" download="Bảo trì Máy By Nguyễn Tuấn Vũ - MNT có Pass" class="ripple">⬇</a>
          </div>
        </div>

        <!-- <div class="file">
          <div class="left">
            <span class="icon">📄</span>
            <div class="info">
              <span class="name">report.pdf</span>
              <span class="size">2MB</span>
            </div>
          </div>

          <div class="actions">
            <button class="ripple" data-link="files/report.pdf">📋</button>
            <a href="files/report.pdf" download class="ripple">⬇</a>
          </div>
        </div> -->

      </div>

    </div>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    NTV - Nguyễn Tuấn Vũ
  </footer>

</body>
</html>
